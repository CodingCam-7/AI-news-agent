name: AI News Digest

on:
  schedule:
    - cron: '30 6 */3 * *'  # 8:30 AM SAST (UTC+2) every 3 days
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Bypass dedup and resend all matched articles (for testing)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          RECIPIENTS_JSON: ${{ secrets.RECIPIENTS_JSON }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
        run: python emailer.py
