name: AI News Digest

on:
  schedule:
    - cron: '30 6 */2 * *'  # 8:30 AM SAST (UTC+2) every other day
  workflow_dispatch:
    inputs:
      force_send:
        description: 'Bypass dedup and resend all matched articles (for testing)'
        type: boolean
        default: false

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          FORCE_SEND: ${{ github.event.inputs.force_send }}
        run: python emailer.py
